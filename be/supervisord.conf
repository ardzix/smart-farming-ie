[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/tmp/supervisord.pid

[program:django]
directory=/app
command=/bin/sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn smart_land.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true
